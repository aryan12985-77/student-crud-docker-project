version: "3.8"

services:

  mysql:
    image: mysql:5.7
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  web:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: supersecretkey
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: student_db
    depends_on:
      - mysql

volumes:
  mysql_data: